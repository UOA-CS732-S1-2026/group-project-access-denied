name: Frontend CI

# On every push to any branch, AND on every pull request targeting any branch
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  lint-and-build:
    name: Lint & Build Frontend
    runs-on: ubuntu-latest

    steps:
      # Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Node.js with caching for faster runs
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Install dependencies
      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # Run ESLint (code quality checker for JavaScript) — fails the job if there are lint errors
      # Your eslintrc has max-warnings 0, so even warnings are fatal
      - name: Lint
        working-directory: frontend
        run: npm run lint

      # Build — fails if Vite can't compile the app
      # This catches import errors, missing files, broken JSX, etc.
      - name: Build
        working-directory: frontend
        run: npm run build