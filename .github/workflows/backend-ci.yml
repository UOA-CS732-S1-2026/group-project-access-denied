name: Backend CI

# On every push to any branch, AND on every pull request targeting any branch
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest  # GitHub spins up a fresh Ubuntu VM for this

    # We don't have a real MongoDB in CI, so we spin one up as a service container
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      # Check out the repo code onto the VM
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Node.js (match whatever version you're developing with)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      # Install dependencies
      - name: Install dependencies
        working-directory: backend
        run: npm ci  # 'ci' is like 'install' but faster and stricter — use it in CI

      # We provide fake env vars so the app doesn't crash on startup
      # (without needing your actual .env file)
      - name: Run tests
        working-directory: backend
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/access-denied-test
          JWT_SECRET: super-secret-test-key-not-real
          PORT: 3000
        run: npm test